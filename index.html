<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0c">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>daarkowz timer</title>
<style>
  :root{
    --bg:#0a0a0c;
    --panel:#131316;
    --hairline:#232327;
    --text:#e9e9ea;
    --text-dim:#8b8b90;
    --timer:#AAAAAA;
    --timer-decimals:#666668;
    --pb:#313131;
    --ahead-gain:#2D2D2D;
    --ahead-lose:#70CC89;
    --behind-gain:#CC7870;
    --behind-lose:#CC3729;
    --best-seg:#D8AF1F;
    --not-running:#959595;
    --paused:#7A7A7A;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;
    flex-direction:column;
    min-height:100vh;
    min-height:100dvh;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    overflow:hidden;
  }

  /* ---------- header / title ---------- */
  .titlebar{
    padding:14px 18px 8px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .titlebar .name{
    font-size:13px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:600;
  }
  .titlebar .attempts{
    font-size:12px;
    color:var(--text-dim);
    font-variant-numeric:tabular-nums;
  }

  /* ---------- timer ---------- */
  .timer-wrap{
    text-align:center;
    padding:6px 10px 14px;
    border-bottom:1px solid var(--hairline);
  }
  .timer{
    font-variant-numeric:tabular-nums;
    font-weight:300;
    line-height:1;
    letter-spacing:-1px;
  }
  .timer .main{
    font-size:min(15vw,64px);
    color:var(--timer);
  }
  .timer .decimals{
    font-size:min(7vw,30px);
    color:var(--timer-decimals);
  }
  .state-notrunning .timer .main{color:var(--not-running);}
  .state-paused .timer .main{color:var(--paused);}
  .state-ahead-gain .timer .main{color:var(--ahead-gain);}
  .state-ahead-lose .timer .main{color:var(--ahead-lose);}
  .state-behind-gain .timer .main{color:var(--behind-gain);}
  .state-behind-lose .timer .main{color:var(--behind-lose);}

  .delta{
    margin-top:4px;
    font-size:14px;
    font-variant-numeric:tabular-nums;
    min-height:18px;
    font-weight:600;
  }

  /* ---------- splits ---------- */
  .splits{
    flex:1;
    overflow-y:auto;
    padding:6px 10px;
    -webkit-overflow-scrolling:touch;
  }
  .split-row{
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:10px;
    align-items:center;
    padding:10px 8px;
    border-bottom:1px solid var(--hairline);
    font-size:14px;
  }
  .split-row.current{
    background:var(--panel);
    border-radius:8px;
  }
  .split-row .sname{
    color:var(--text);
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .split-row.done .sname{color:var(--text-dim);}
  .split-row .sdelta{
    font-variant-numeric:tabular-nums;
    font-size:12.5px;
    min-width:52px;
    text-align:right;
  }
  .split-row .stime{
    font-variant-numeric:tabular-nums;
    color:var(--text-dim);
    min-width:64px;
    text-align:right;
  }
  .split-row.best-segment .stime{color:var(--best-seg);}
  .d-ahead-gain{color:var(--ahead-gain);}
  .d-ahead-lose{color:var(--ahead-lose);}
  .d-behind-gain{color:var(--behind-gain);}
  .d-behind-lose{color:var(--behind-lose);}

  .empty-hint{
    color:var(--text-dim);
    font-size:13px;
    text-align:center;
    padding:30px 20px;
    line-height:1.5;
  }

  /* ---------- controls ---------- */
  .controls{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    padding:10px;
    border-top:1px solid var(--hairline);
  }
  button{
    appearance:none;
    border:1px solid var(--hairline);
    background:var(--panel);
    color:var(--text);
    font-size:13px;
    font-weight:600;
    letter-spacing:.03em;
    padding:14px 8px;
    border-radius:10px;
    text-transform:uppercase;
  }
  button:active{background:#1c1c20;}
  button.primary{color:var(--ahead-lose); border-color:#2a3a2e;}
  button.danger{color:var(--behind-lose); border-color:#3a2320;}
  .row2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    padding:0 10px 10px;
  }
  button.ghost{
    background:transparent;
    color:var(--text-dim);
    font-weight:500;
  }

  /* ---------- edit panel ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,.6);
    display:none; align-items:flex-end; justify-content:center; z-index:20;
  }
  .sheet-backdrop.open{display:flex;}
  .sheet{
    background:var(--panel);
    width:100%;
    max-width:520px;
    border-radius:16px 16px 0 0;
    padding:16px 16px calc(16px + env(safe-area-inset-bottom));
    max-height:80vh;
    overflow-y:auto;
  }
  .sheet h3{margin:0 0 12px; font-size:15px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em;}
  .sheet-row{display:flex; gap:8px; margin-bottom:8px;}
  .sheet-row input{
    flex:1;
    background:#0f0f12;
    border:1px solid var(--hairline);
    color:var(--text);
    border-radius:8px;
    padding:10px 12px;
    font-size:14px;
  }
  .sheet-row button{padding:10px 14px;}
  .sheet-actions{display:flex; gap:8px; margin-top:14px;}
  .sheet-actions button{flex:1;}
</style>
</head>
<body class="state-notrunning" id="body">

  <div class="titlebar">
    <div class="name">daarkowz</div>
    <div class="attempts" id="attempts">0 tentatives</div>
  </div>

  <div class="timer-wrap">
    <div class="timer">
      <span class="main" id="timerMain">0:00</span><span class="decimals" id="timerDec">.00</span>
    </div>
    <div class="delta" id="deltaLabel"></div>
  </div>

  <div class="splits" id="splits">
    <div class="empty-hint" id="emptyHint">
      Aucun split configuré.<br>
      Touche "Modifier les splits" en bas pour ajouter tes segments (ex : Départ, Zone 2, Boss, Fin).
    </div>
  </div>

  <div class="controls">
    <button class="primary" id="btnStart">Démarrer</button>
    <button id="btnPause">Pause</button>
    <button class="danger" id="btnReset">Réinit.</button>
  </div>
  <div class="row2">
    <button class="ghost" id="btnEdit">Modifier les splits</button>
    <button class="ghost" id="btnSavePB">Sauver comme référence</button>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop">
    <div class="sheet">
      <h3>Segments</h3>
      <div id="sheetRows"></div>
      <div class="sheet-row">
        <input type="text" id="newSplitName" placeholder="Nom du segment">
        <button id="addSplitBtn">Ajouter</button>
      </div>
      <div class="sheet-actions">
        <button class="ghost" id="closeSheet">Fermer</button>
      </div>
    </div>
  </div>

<script>
(function(){
  // ---- state (mémoire uniquement, se réinitialise si tu recharges la page) ----
  let splitNames = [];          // noms des segments
  let referenceTimes = [];      // meilleurs temps cumulés connus, par segment (ms) — "PB"
  let currentTimes = [];        // temps cumulés de la tentative en cours (ms)
  let bestSegments = [];        // meilleur temps de CE segment isolé, déjà observé (ms)

  let running = false;
  let paused = false;
  let startTs = 0;
  let elapsedAtPause = 0;
  let currentSplitIndex = 0;
  let attempts = 0;
  let rafId = null;

  const el = {
    body: document.getElementById('body'),
    main: document.getElementById('timerMain'),
    dec: document.getElementById('timerDec'),
    delta: document.getElementById('deltaLabel'),
    splits: document.getElementById('splits'),
    emptyHint: document.getElementById('emptyHint'),
    attempts: document.getElementById('attempts'),
    btnStart: document.getElementById('btnStart'),
    btnPause: document.getElementById('btnPause'),
    btnReset: document.getElementById('btnReset'),
    btnEdit: document.getElementById('btnEdit'),
    btnSavePB: document.getElementById('btnSavePB'),
    sheetBackdrop: document.getElementById('sheetBackdrop'),
    sheetRows: document.getElementById('sheetRows'),
    newSplitName: document.getElementById('newSplitName'),
    addSplitBtn: document.getElementById('addSplitBtn'),
    closeSheet: document.getElementById('closeSheet'),
  };

  function fmt(ms, withDecimals){
    if(ms < 0) ms = 0;
    const totalCs = Math.floor(ms/10);
    const cs = totalCs % 100;
    const totalSec = Math.floor(totalCs/100);
    const s = totalSec % 60;
    const totalMin = Math.floor(totalSec/60);
    const m = totalMin % 60;
    const h = Math.floor(totalMin/60);
    let main = h > 0 ? (h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0'))
                      : (m + ':' + String(s).padStart(2,'0'));
    if(withDecimals) return {main, dec: '.'+String(cs).padStart(2,'0')};
    return {main, dec:''};
  }
  function fmtDelta(ms){
    const sign = ms < 0 ? '−' : '+';
    const a = Math.abs(ms);
    const {main} = fmt(a, false);
    const cs = Math.floor((a % 1000)/10);
    return sign + main + '.' + String(cs).padStart(2,'0');
  }

  function renderSplits(){
    el.splits.innerHTML = '';
    if(splitNames.length === 0){
      el.splits.appendChild(el.emptyHint);
      return;
    }
    splitNames.forEach((name, i) => {
      const row = document.createElement('div');
      row.className = 'split-row';
      if(i === currentSplitIndex && running) row.classList.add('current');
      if(i < currentSplitIndex || (i===currentSplitIndex && !running && currentTimes[i]!=null)) row.classList.add('done');

      const ref = referenceTimes[i];
      const cur = currentTimes[i];
      let deltaHtml = '';
      let timeHtml = ref!=null ? fmt(ref,false).main : '—';

      if(cur != null){
        timeHtml = fmt(cur,false).main;
        if(ref != null){
          const diff = cur - ref;
          const cls = diff <= 0 ? 'd-ahead-lose' : 'd-behind-lose';
          deltaHtml = '<span class="sdelta '+cls+'">'+fmtDelta(diff)+'</span>';
        }
      }

      const segBest = bestSegments[i];
      const segTime = (cur!=null && i>0) ? cur - currentTimes[i-1] : (cur!=null ? cur : null);
      if(segBest != null && segTime != null && segTime <= segBest && cur != null){
        row.classList.add('best-segment');
      }

      row.innerHTML =
        '<div class="sname">'+ (i+1) +'. '+ escapeHtml(name) +'</div>' +
        (deltaHtml || '<span class="sdelta"></span>') +
        '<div class="stime">'+ timeHtml +'</div>';
      el.splits.appendChild(row);
    });
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function tick(){
    if(running && !paused){
      const now = performance.now();
      const elapsed = elapsedAtPause + (now - startTs);
      const {main, dec} = fmt(elapsed, true);
      el.main.textContent = main;
      el.dec.textContent = dec;

      // couleur en direct par rapport à la référence si dispo
      if(splitNames.length && currentSplitIndex < splitNames.length){
        const prevCum = currentSplitIndex>0 ? (referenceTimes[currentSplitIndex-1]||0) : 0;
        const refThis = referenceTimes[currentSplitIndex];
        el.body.classList.remove('state-ahead-gain','state-ahead-lose','state-behind-gain','state-behind-lose','state-notrunning','state-paused');
        if(refThis != null){
          const diffNow = elapsed - refThis;
          if(diffNow <= 0){
            el.body.classList.add('state-ahead-lose');
            el.delta.textContent = fmtDelta(diffNow) + ' — en avance';
            el.delta.className = 'delta d-ahead-lose';
          } else {
            el.body.classList.add('state-behind-lose');
            el.delta.textContent = fmtDelta(diffNow) + ' — en retard';
            el.delta.className = 'delta d-behind-lose';
          }
        } else {
          el.delta.textContent = '';
        }
      }
      rafId = requestAnimationFrame(tick);
    }
  }

  function start(){
    if(splitNames.length === 0){
      openSheet();
      return;
    }
    running = true;
    paused = false;
    currentSplitIndex = 0;
    currentTimes = new Array(splitNames.length).fill(null);
    startTs = performance.now();
    elapsedAtPause = 0;
    attempts++;
    el.attempts.textContent = attempts + ' tentative' + (attempts>1?'s':'');
    el.btnStart.textContent = 'Split';
    el.body.className = 'state-notrunning';
    renderSplits();
    tick();
  }

  function split(){
    if(!running || paused) return;
    const now = performance.now();
    const elapsed = elapsedAtPause + (now - startTs);
    currentTimes[currentSplitIndex] = elapsed;

    const segTime = currentSplitIndex>0 ? elapsed - currentTimes[currentSplitIndex-1] : elapsed;
    if(bestSegments[currentSplitIndex] == null || segTime < bestSegments[currentSplitIndex]){
      bestSegments[currentSplitIndex] = segTime;
    }

    currentSplitIndex++;
    if(currentSplitIndex >= splitNames.length){
      // fin de la tentative
      running = false;
      cancelAnimationFrame(rafId);
      el.btnStart.textContent = 'Démarrer';
      el.body.className = 'state-notrunning';
      el.delta.textContent = 'Terminé';
      el.delta.className = 'delta';
    }
    renderSplits();
  }

  function pause(){
    if(!running) return;
    if(!paused){
      paused = true;
      elapsedAtPause += performance.now() - startTs;
      cancelAnimationFrame(rafId);
      el.body.className = 'state-paused';
      el.btnPause.textContent = 'Reprendre';
    } else {
      paused = false;
      startTs = performance.now();
      el.btnPause.textContent = 'Pause';
      tick();
    }
  }

  function reset(){
    running = false;
    paused = false;
    cancelAnimationFrame(rafId);
    currentSplitIndex = 0;
    currentTimes = new Array(splitNames.length).fill(null);
    el.main.textContent = '0:00';
    el.dec.textContent = '.00';
    el.delta.textContent = '';
    el.btnStart.textContent = 'Démarrer';
    el.btnPause.textContent = 'Pause';
    el.body.className = 'state-notrunning';
    renderSplits();
  }

  function savePB(){
    if(currentTimes.some(t => t == null)){
      alert('Termine une tentative complète avant de la sauver comme référence.');
      return;
    }
    referenceTimes = currentTimes.slice();
    alert('Temps de référence mis à jour pour cette session.');
    renderSplits();
  }

  // ---- édition des splits ----
  function openSheet(){
    renderSheetRows();
    el.sheetBackdrop.classList.add('open');
  }
  function closeSheet(){
    el.sheetBackdrop.classList.remove('open');
  }
  function renderSheetRows(){
    el.sheetRows.innerHTML = '';
    splitNames.forEach((name, i) => {
      const row = document.createElement('div');
      row.className = 'sheet-row';
      row.innerHTML = '<input type="text" data-i="'+i+'" value="'+ escapeHtml(name) +'"><button data-del="'+i+'">✕</button>';
      el.sheetRows.appendChild(row);
    });
    el.sheetRows.querySelectorAll('input').forEach(inp=>{
      inp.addEventListener('change', e=>{
        splitNames[+e.target.dataset.i] = e.target.value || ('Segment '+(+e.target.dataset.i+1));
      });
    });
    el.sheetRows.querySelectorAll('button[data-del]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        const i = +e.target.dataset.del;
        splitNames.splice(i,1);
        referenceTimes.splice(i,1);
        bestSegments.splice(i,1);
        renderSheetRows();
      });
    });
  }

  el.addSplitBtn.addEventListener('click', ()=>{
    const v = el.newSplitName.value.trim();
    if(v){
      splitNames.push(v);
      el.newSplitName.value='';
      renderSheetRows();
    }
  });
  el.newSplitName.addEventListener('keydown', e=>{
    if(e.key==='Enter') el.addSplitBtn.click();
  });
  el.btnEdit.addEventListener('click', openSheet);
  el.closeSheet.addEventListener('click', ()=>{ closeSheet(); reset(); });
  el.sheetBackdrop.addEventListener('click', (e)=>{ if(e.target===el.sheetBackdrop){ closeSheet(); reset(); }});

  el.btnStart.addEventListener('click', ()=>{
    if(!running) start(); else split();
  });
  el.btnPause.addEventListener('click', pause);
  el.btnReset.addEventListener('click', reset);
  el.btnSavePB.addEventListener('click', savePB);

  renderSplits();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
})();
</script>
</body>
</html>
